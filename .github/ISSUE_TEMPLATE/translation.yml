name: 🌐 번역·자막 개선 (Translation)
description: 83개 언어 자막·UI 번역 개선 제안
labels: [i18n, translation]
body:
  - type: dropdown
    id: language
    attributes:
      label: 언어 (Language)
      description: 개선하고 싶은 언어를 선택해주세요
      options:
        - ko (한국어)
        - en (English)
        - ja (日本語)
        - zh-CN (简体中文)
        - zh-TW (繁體中文)
        - es (Español)
        - fr (Français)
        - de (Deutsch)
        - ar (العربية)
        - he (עברית)
        - 기타 (본문에 기재)
    validations:
      required: true

  - type: textarea
    id: suggestion
    attributes:
      label: 개선 제안
      description: 현재 번역 → 제안 번역 순서로
      placeholder: |
        파일: /srt/xx.srt
        라인 12 (00:00:32,500 --> 00:00:35,200)
        현재: "..."
        제안: "..."
        이유: 원문 한국어의 뉘앙스 '...' 가 더 정확히 전달됩니다
    validations:
      required: true

  - type: checkboxes
    id: qualification
    attributes:
      label: 자격 확인
      options:
        - label: 저는 해당 언어의 원어민 또는 전문 화자입니다
          required: true
