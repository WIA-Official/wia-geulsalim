<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>WIA 글살림 · 오프라인</title>
<link rel="icon" href="/favicon.ico">
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Noto Sans KR','Malgun Gothic',sans-serif;
    min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
    background: linear-gradient(135deg, #0a0e1a 0%, #1a1f35 100%);
    color: #e2e8f0;
    padding: 24px;
  }
  main { max-width: 480px; text-align: center; }
  .emoji { font-size: 72px; line-height: 1; margin-bottom: 20px; }
  h1 { font-size: 28px; color: #a78bfa; margin-bottom: 12px; font-weight: 800; }
  p { font-size: 15px; line-height: 1.8; color: #cbd5e1; margin-bottom: 20px; }
  .philosophy { font-family: serif; font-size: 20px; color: #fbbf24; margin: 24px 0 6px; letter-spacing: 4px; }
  .philosophy-sub { font-size: 12px; color: #94a3b8; }
  .btn {
    display: inline-block; margin-top: 18px;
    padding: 12px 26px; background: #6c3ce1; color: #fff;
    text-decoration: none; border-radius: 8px; font-weight: 700;
    transition: background 0.2s;
  }
  .btn:hover { background: #7c4cf0; }
  .note { font-size: 12px; color: #64748b; margin-top: 20px; }
</style>
</head>
<body>
<main>
  <div class="emoji">📡</div>
  <h1>오프라인 상태입니다</h1>
  <p>
    인터넷 연결이 끊긴 것 같네요.<br>
    연결을 확인하신 후 다시 시도해주세요.
  </p>
  <a href="/" class="btn">다시 연결 시도</a>
  <div class="philosophy">弘益人間</div>
  <div class="philosophy-sub">홍익인간 — 두루 이롭게 하되, 지속가능하게</div>
  <p class="note">WIA 글살림 · Geulsalim</p>
</main>
<script>
  // 연결 복구되면 자동으로 메인으로
  window.addEventListener('online', () => { location.href = '/'; });
</script>
</body>
</html>
